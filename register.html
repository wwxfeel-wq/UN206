<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>时墨之境 — 注册</title>
  <style>
    /* ============================================
       时墨之境 — 注册/登录页
       深色背景 + Apple Liquid Glass 玻璃卡片
       ============================================ */
    :root {
      --bg: #05050A;
      --font: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', 'Source Han Sans SC', sans-serif;
      --cyan: #22D3EE;
      --indigo: #818CF8;
      --error: #FF453A;
      /* 文字色阶 */
      --ink-1: rgba(255, 255, 255, 0.96);
      --ink-2: rgba(255, 255, 255, 0.6);
      --ink-3: rgba(255, 255, 255, 0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; min-height: 100vh; height: 100%;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--bg);
      color: var(--ink-1);
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    /* 背景径向光晕 — 左上角青色，右下角靛色，很淡 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 70% 60% at 15% 18%, rgba(34, 211, 238, 0.10), transparent 60%),
        radial-gradient(ellipse 70% 60% at 85% 82%, rgba(129, 140, 248, 0.10), transparent 60%);
    }
    /* 背景细点纹理 */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: radial-gradient(circle, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 28px 28px;
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    }

    /* 返回首页链接 — 左上角 */
    .back-home {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      color: var(--ink-3);
      padding: 0.5rem 0.9rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      transition: all 0.25s ease;
    }
    .back-home:hover {
      color: var(--ink-1);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }
    .back-home:active { transform: scale(0.96); }
    .back-home svg { width: 14px; height: 14px; }

    /* 主容器 — 居中布局 */
    .stage {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* 玻璃卡片 */
    .auth-card {
      width: 380px;
      max-width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(40px) saturate(1.8);
      -webkit-backdrop-filter: blur(40px) saturate(1.8);
      border: 0.5px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      padding: 2.5rem 2.25rem 2rem;
      box-shadow:
        0 1px 0 0 rgba(255, 255, 255, 0.08) inset,
        0 20px 60px rgba(0, 0, 0, 0.45),
        0 0 120px rgba(34, 211, 238, 0.04);
      position: relative;
      overflow: hidden;
      animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    /* 卡片顶部高光 */
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      border-radius: 28px 28px 0 0;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.06), transparent);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Logo 区 */
    .brand {
      text-align: center;
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
    }
    .brand .logo {
      font-size: 1.7rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      color: var(--ink-1);
      text-indent: 0.35em;
      text-shadow: 0 0 30px rgba(34, 211, 238, 0.25);
    }
    .brand .subtitle {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      color: var(--ink-3);
      margin-top: 0.7rem;
      font-weight: 300;
    }

    /* 表单切换容器 */
    .form-wrap {
      position: relative;
      z-index: 1;
    }
    .auth-form {
      transition: opacity 0.28s ease, transform 0.28s ease;
    }
    .auth-form.is-hidden {
      display: none;
    }
    .auth-form.is-leaving {
      opacity: 0;
      transform: translateY(-8px);
    }
    .auth-form.is-entering {
      opacity: 0;
      transform: translateY(8px);
    }

    /* 字段组 */
    .field-group {
      margin-bottom: 0.95rem;
    }
    .field-label {
      display: block;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--ink-2);
      margin-bottom: 0.45rem;
    }
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-field {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: var(--ink-1);
      padding: 0.8rem 1.05rem;
      font-size: 0.92rem;
      font-family: var(--font);
      outline: none;
      transition: all 0.2s ease;
      -webkit-appearance: none;
    }
    .input-field::placeholder { color: var(--ink-3); }
    .input-field:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.04);
    }
    /* 密码框留出图标空间 */
    .input-field.has-toggle { padding-right: 2.85rem; }
    /* 错误态 */
    .input-field.error {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(255, 69, 58, 0.12);
    }

    /* 显示/隐藏密码按钮 */
    .toggle-pwd {
      position: absolute;
      right: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      color: var(--ink-3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: color 0.2s ease, background 0.2s ease;
    }
    .toggle-pwd:hover { color: var(--ink-2); background: rgba(255, 255, 255, 0.05); }
    .toggle-pwd:active { transform: translateY(-50%) scale(0.9); }
    .toggle-pwd svg { width: 18px; height: 18px; }

    /* 字段错误提示 */
    .field-error {
      font-size: 0.72rem;
      color: var(--error);
      margin-top: 0.4rem;
      padding-left: 0.2rem;
      min-height: 0;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity 0.2s ease, max-height 0.2s ease, margin-top 0.2s ease;
    }
    .field-error.show {
      opacity: 1;
      max-height: 2rem;
    }

    /* 主按钮 — 白底黑字 */
    .btn-primary {
      width: 100%;
      padding: 0.85rem;
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      font-family: var(--font);
      background: #fff;
      color: #000;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s ease, background 0.2s ease, color 0.2s ease;
      margin-top: 0.6rem;
    }
    .btn-primary:active { transform: scale(0.96); }
    .btn-primary:disabled {
      background: rgba(255, 255, 255, 0.12);
      color: var(--ink-3);
      cursor: not-allowed;
    }
    .btn-primary:disabled:active { transform: none; }

    /* 切换链接 */
    .switch-row {
      text-align: center;
      margin-top: 1.4rem;
      font-size: 0.8rem;
      color: var(--ink-3);
    }
    .switch-link {
      color: var(--ink-2);
      cursor: pointer;
      transition: color 0.2s ease;
      border-bottom: 0.5px solid transparent;
      padding-bottom: 1px;
    }
    .switch-link:hover { color: var(--ink-1); border-bottom-color: rgba(255, 255, 255, 0.3); }

    /* 分隔线 */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 1.5rem 0 1.1rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: rgba(255, 255, 255, 0.08);
    }
    .divider span {
      font-size: 0.66rem;
      letter-spacing: 0.15em;
      color: var(--ink-3);
    }

    /* 游客访问 */
    .guest-link {
      display: block;
      text-align: center;
      font-size: 0.78rem;
      color: var(--ink-3);
      cursor: pointer;
      padding: 0.55rem;
      border-radius: 12px;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.02);
      transition: all 0.2s ease;
    }
    .guest-link:hover {
      color: var(--ink-2);
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.14);
    }
    .guest-link:active { transform: scale(0.98); }

    /* 全局提示 toast */
    .toast {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      z-index: 100;
      padding: 0.7rem 1.3rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px) saturate(1.8);
      -webkit-backdrop-filter: blur(20px) saturate(1.8);
      border: 0.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      font-size: 0.82rem;
      color: var(--ink-1);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 响应式 */
    @media (max-width: 420px) {
      .auth-card { padding: 2rem 1.5rem 1.6rem; border-radius: 24px; }
      .brand .logo { font-size: 1.5rem; }
      .back-home { top: 1rem; left: 1rem; }
    }
  </style>
</head>
<body>

  <!-- 返回首页 -->
  <a class="back-home" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
    返回首页
  </a>

  <!-- 全局提示 -->
  <div class="toast" id="toast"></div>

  <div class="stage">
    <div class="auth-card">
      <!-- Logo -->
      <div class="brand">
        <div class="logo">时墨之境</div>
        <div class="subtitle">把等待还给表达，把思念还给时间</div>
      </div>

      <div class="form-wrap">
        <!-- 登录表单（默认） -->
        <form class="auth-form" id="loginForm" autocomplete="off" novalidate>
          <div class="field-group">
            <label class="field-label" for="loginUser">用户名</label>
            <div class="input-wrap">
              <input class="input-field" type="text" id="loginUser" placeholder="输入你的用户名" autocomplete="off">
            </div>
            <div class="field-error" id="loginUserErr"></div>
          </div>

          <div class="field-group">
            <label class="field-label" for="loginPwd">密码</label>
            <div class="input-wrap">
              <input class="input-field has-toggle" type="password" id="loginPwd" placeholder="输入密码" autocomplete="off">
              <button type="button" class="toggle-pwd" data-target="loginPwd" aria-label="显示密码">
                <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <div class="field-error" id="loginPwdErr"></div>
          </div>

          <button type="submit" class="btn-primary" id="loginBtn" disabled>登 录</button>

          <div class="switch-row">
            还没账号？<span class="switch-link" data-switch="register">注册</span>
          </div>

          <div class="divider"><span>或</span></div>
          <a class="guest-link" href="chat.html">游客访问 · 先去看看</a>
        </form>

        <!-- 注册表单 -->
        <form class="auth-form is-hidden" id="registerForm" autocomplete="off" novalidate>
          <div class="field-group">
            <label class="field-label" for="regUser">用户名</label>
            <div class="input-wrap">
              <input class="input-field" type="text" id="regUser" placeholder="2-20 个字符" autocomplete="off" maxlength="20">
            </div>
            <div class="field-error" id="regUserErr"></div>
          </div>

          <div class="field-group">
            <label class="field-label" for="regPwd">密码</label>
            <div class="input-wrap">
              <input class="input-field has-toggle" type="password" id="regPwd" placeholder="至少 6 位" autocomplete="off">
              <button type="button" class="toggle-pwd" data-target="regPwd" aria-label="显示密码">
                <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <div class="field-error" id="regPwdErr"></div>
          </div>

          <div class="field-group">
            <label class="field-label" for="regPwd2">确认密码</label>
            <div class="input-wrap">
              <input class="input-field has-toggle" type="password" id="regPwd2" placeholder="再次输入密码" autocomplete="off">
              <button type="button" class="toggle-pwd" data-target="regPwd2" aria-label="显示密码">
                <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <div class="field-error" id="regPwd2Err"></div>
          </div>

          <button type="submit" class="btn-primary" id="registerBtn" disabled>注 册</button>

          <div class="switch-row">
            已有账号？<span class="switch-link" data-switch="login">登录</span>
          </div>

          <div class="divider"><span>或</span></div>
          <a class="guest-link" href="chat.html">游客访问 · 先去看看</a>
        </form>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      /* ====== localStorage 键名 ====== */
      var USERS_KEY = 'smzj_users';
      var CURRENT_USER_KEY = 'smzj_current_user';

      /* ====== DOM 引用 ====== */
      var loginForm    = document.getElementById('loginForm');
      var registerForm = document.getElementById('registerForm');
      var toastEl      = document.getElementById('toast');

      /* ====== 工具函数 ====== */
      function getUsers() {
        try {
          var raw = localStorage.getItem(USERS_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch (e) {
          return [];
        }
      }

      function saveUsers(users) {
        localStorage.setItem(USERS_KEY, JSON.stringify(users));
      }

      function showToast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        setTimeout(function () { toastEl.classList.remove('show'); }, 2200);
      }

      function setFieldError(input, errEl, message) {
        if (message) {
          input.classList.add('error');
          errEl.textContent = message;
          errEl.classList.add('show');
        } else {
          input.classList.remove('error');
          errEl.classList.remove('show');
          errEl.textContent = '';
        }
      }

      /* ====== 已登录用户自动跳转 ====== */
      var currentUser = localStorage.getItem(CURRENT_USER_KEY);
      if (currentUser) {
        window.location.replace('chat.html');
        return;
      }

      /* ====== 密码显示/隐藏切换 ====== */
      document.querySelectorAll('.toggle-pwd').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var targetId = btn.getAttribute('data-target');
          var input = document.getElementById(targetId);
          var eye = btn.querySelector('.icon-eye');
          var eyeOff = btn.querySelector('.icon-eye-off');
          if (input.type === 'password') {
            input.type = 'text';
            eye.style.display = 'none';
            eyeOff.style.display = 'block';
            btn.setAttribute('aria-label', '隐藏密码');
          } else {
            input.type = 'password';
            eye.style.display = 'block';
            eyeOff.style.display = 'none';
            btn.setAttribute('aria-label', '显示密码');
          }
        });
      });

      /* ====== 表单切换（平滑过渡） ====== */
      var isSwitching = false;
      function switchForm(target) {
        if (isSwitching) return;
        var showForm = target === 'register' ? registerForm : loginForm;
        var hideForm = target === 'register' ? loginForm : registerForm;
        if (hideForm.classList.contains('is-hidden')) return;

        isSwitching = true;
        hideForm.classList.add('is-leaving');

        setTimeout(function () {
          hideForm.classList.add('is-hidden');
          hideForm.classList.remove('is-leaving');
          showForm.classList.remove('is-hidden');
          showForm.classList.add('is-entering');
          // 强制重绘后移除 entering 类，触发淡入
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              showForm.classList.remove('is-entering');
              isSwitching = false;
            });
          });
        }, 280);
      }

      document.querySelectorAll('.switch-link').forEach(function (link) {
        link.addEventListener('click', function () {
          switchForm(link.getAttribute('data-switch'));
        });
      });

      /* ====== 输入时清除错误 & 更新按钮状态 ====== */
      function bindClear(input, errEl) {
        input.addEventListener('input', function () {
          if (input.classList.contains('error')) {
            setFieldError(input, errEl, '');
          }
          updateButtons();
        });
      }

      var loginUserEl = document.getElementById('loginUser');
      var loginPwdEl   = document.getElementById('loginPwd');
      var regUserEl    = document.getElementById('regUser');
      var regPwdEl     = document.getElementById('regPwd');
      var regPwd2El    = document.getElementById('regPwd2');

      var loginUserErr = document.getElementById('loginUserErr');
      var loginPwdErr  = document.getElementById('loginPwdErr');
      var regUserErr   = document.getElementById('regUserErr');
      var regPwdErr    = document.getElementById('regPwdErr');
      var regPwd2Err   = document.getElementById('regPwd2Err');

      bindClear(loginUserEl, loginUserErr);
      bindClear(loginPwdEl, loginPwdErr);
      bindClear(regUserEl, regUserErr);
      bindClear(regPwdEl, regPwdErr);
      bindClear(regPwd2El, regPwd2Err);

      var loginBtn    = document.getElementById('loginBtn');
      var registerBtn = document.getElementById('registerBtn');

      function updateButtons() {
        var loginFilled  = loginUserEl.value.trim() !== '' && loginPwdEl.value !== '';
        var regFilled    = regUserEl.value.trim() !== '' && regPwdEl.value !== '' && regPwd2El.value !== '';
        loginBtn.disabled    = !loginFilled;
        registerBtn.disabled  = !regFilled;
      }

      /* ====== 登录处理 ====== */
      loginForm.addEventListener('submit', function (e) {
        e.preventDefault();
        if (loginBtn.disabled) return;

        var username = loginUserEl.value.trim();
        var password = loginPwdEl.value;
        var hasError = false;

        // 清空旧错误
        setFieldError(loginUserEl, loginUserErr, '');
        setFieldError(loginPwdEl, loginPwdErr, '');

        if (!username) {
          setFieldError(loginUserEl, loginUserErr, '请输入用户名');
          hasError = true;
        }
        if (!password) {
          setFieldError(loginPwdEl, loginPwdErr, '请输入密码');
          hasError = true;
        }
        if (hasError) return;

        var users = getUsers();
        var matched = null;
        for (var i = 0; i < users.length; i++) {
          if (users[i].username === username && users[i].password === password) {
            matched = users[i];
            break;
          }
        }

        if (!matched) {
          // 区分：用户名不存在 / 密码错误
          var userExists = users.some(function (u) { return u.username === username; });
          if (!userExists) {
            setFieldError(loginUserEl, loginUserErr, '该用户不存在，请先注册');
          } else {
            setFieldError(loginPwdEl, loginPwdErr, '密码不正确');
          }
          return;
        }

        // 登录成功
        localStorage.setItem(CURRENT_USER_KEY, username);
        showToast('欢迎回来，' + username);
        setTimeout(function () {
          window.location.href = 'chat.html';
        }, 600);
      });

      /* ====== 注册处理 ====== */
      registerForm.addEventListener('submit', function (e) {
        e.preventDefault();
        if (registerBtn.disabled) return;

        var username = regUserEl.value.trim();
        var password = regPwdEl.value;
        var confirm  = regPwd2El.value;
        var hasError = false;

        // 清空旧错误
        setFieldError(regUserEl, regUserErr, '');
        setFieldError(regPwdEl, regPwdErr, '');
        setFieldError(regPwd2El, regPwd2Err, '');

        // 用户名校验：2-20 字符
        if (username.length < 2 || username.length > 20) {
          setFieldError(regUserEl, regUserErr, '用户名需为 2-20 个字符');
          hasError = true;
        }
        // 密码校验：6 位以上
        if (password.length < 6) {
          setFieldError(regPwdEl, regPwdErr, '密码至少 6 位');
          hasError = true;
        }
        // 确认密码校验
        if (confirm !== password) {
          setFieldError(regPwd2El, regPwd2Err, '两次输入的密码不一致');
          hasError = true;
        }
        if (hasError) return;

        // 用户名重复校验
        var users = getUsers();
        var duplicate = users.some(function (u) { return u.username === username; });
        if (duplicate) {
          setFieldError(regUserEl, regUserErr, '该用户名已被注册');
          return;
        }

        // 存储新用户
        users.push({ username: username, password: password, createdAt: Date.now() });
        saveUsers(users);

        // 注册成功后自动登录并跳转
        localStorage.setItem(CURRENT_USER_KEY, username);
        showToast('注册成功，正在进入…');
        setTimeout(function () {
          window.location.href = 'chat.html';
        }, 700);
      });

      // 初始化按钮状态
      updateButtons();
    })();
  </script>
</body>
</html>
